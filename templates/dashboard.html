<!DOCTYPE html>
<html>

<head>

<title>ContentForge Dashboard</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
padding:40px;
}

h1{
margin-bottom:30px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
padding:12px;
border:1px solid #ddd;
text-align:left;
}

th{
background:#0073e6;
color:white;
}

tr:nth-child(even){
background:#f2f2f2;
}

</style>

</head>

<body>

<h1>ContentForge Orders Dashboard</h1>

<table>

<tr>
<th>ID</th>
<th>Name</th>
<th>Email</th>
<th>Content Type</th>
<th>Topic</th>
<th>Audience</th>
<th>Keywords</th>
<th>Brand</th>
</tr>

{% for order in orders %}

<tr>

<td>{{order["id"]}}</td>
<td>{{order["name"]}}</td>
<td>{{order["email"]}}</td>
<td>{{order["content_type"]}}</td>
<td>{{order["topic"]}}</td>
<td>{{order["audience"]}}</td>
<td>{{order["keywords"]}}</td>
<td>{{order["brand"]}}</td>

</tr>

{% endfor %}

</table>

</body>

</html>
