<!DOCTYPE html>
<html>

<head>

<title>ContentForge Dashboard</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
padding:40px;
}

table{
width:100%;
background:white;
border-collapse:collapse;
}

th,td{
padding:12px;
border:1px solid #ddd;
}

th{
background:#0073e6;
color:white;
}

</style>

</head>

<body>

<h1>ContentForge Orders Dashboard</h1>

<table>

<tr>
<th>Type</th>
<th>Topic</th>
<th>Audience</th>
<th>Word Count</th>
<th>Keywords</th>
<th>Brand</th>
</tr>

{% for order in orders %}

<tr>

<td>{{order.type}}</td>
<td>{{order.topic}}</td>
<td>{{order.audience}}</td>
<td>{{order.length}}</td>
<td>{{order.keywords}}</td>
<td>{{order.brand}}</td>

</tr>

{% endfor %}

</table>

</body>

</html>
