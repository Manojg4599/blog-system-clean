<!DOCTYPE html>
<html>

<head>

<title>ContentForge Dashboard</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
padding:40px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
padding:12px;
border:1px solid #ddd;
}

th{
background:#0073e6;
color:white;
}

</style>

</head>

<body>

<h1>ContentForge Orders Dashboard</h1>

<table>

<tr>
<th>Type</th>
<th>Topic</th>
<th>Audience</th>
<th>Length</th>
<th>Keywords</th>
<th>Brand</th>
</tr>

{% for order in orders %}

<tr>

<td>{{order[0]}}</td>
<td>{{order[1]}}</td>
<td>{{order[2]}}</td>
<td>{{order[3]}}</td>
<td>{{order[4]}}</td>
<td>{{order[5]}}</td>

</tr>

{% endfor %}

</table>

</body>
</html>
