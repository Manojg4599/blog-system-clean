<!DOCTYPE html>
<html>
<head>
<title>RankRise Content Studio</title>
</head>

<body>

<h1>RankRise Content Studio</h1>
<h2>Request a Demo Blog</h2>

<form id="demoForm">

<input type="text" id="name" placeholder="Your Name" required>
<br><br>

<input type="email" id="email" placeholder="Email" required>
<br><br>

<input type="text" id="industry" placeholder="Business Industry">
<br><br>

<input type="text" id="topic" placeholder="Blog Topic">
<br><br>

<button type="submit">Request Demo Blog</button>

</form>

<p id="msg"></p>

<script>

document.getElementById("demoForm").addEventListener("submit", async function(e){

e.preventDefault()

const data = {
name: document.getElementById("name").value,
email: document.getElementById("email").value,
industry: document.getElementById("industry").value,
blog_topic: document.getElementById("topic").value
}

const response = await fetch("/api/demo-request",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body: JSON.stringify(data)
})

document.getElementById("msg").innerText = "Request submitted successfully"

})

</script>

</body>
</html>
