<!DOCTYPE html>
<html>
<head>

<title>ContentForge | Professional Content Creation</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
padding:40px;
}

.container{
background:white;
max-width:800px;
margin:auto;
padding:40px;
border-radius:8px;
box-shadow:0 0 12px rgba(0,0,0,0.08);
}

h1{
text-align:center;
margin-bottom:10px;
}

p{
text-align:center;
color:#666;
margin-bottom:30px;
}

label{
font-weight:bold;
}

select,input,textarea{
width:100%;
padding:10px;
margin-top:6px;
margin-bottom:20px;
border:1px solid #ddd;
border-radius:4px;
}

button{
background:#0073e6;
color:white;
padding:14px;
border:none;
border-radius:5px;
width:100%;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#005bb5;
}

</style>

</head>

<body>

<div class="container">

<h1>ContentForge</h1>

<p>Professional SEO-Optimized Content Creation Service</p>

<form id="contentForm">

<label>Content Type</label>

<select name="type">

<option>Blog Article</option>
<option>SEO Landing Page</option>
<option>Product Comparison Article</option>
<option>Educational Guide</option>
<option>FAQ Page</option>
<option>Business Article</option>

</select>

<label>Primary Topic</label>

<input name="topic" placeholder="Example: Best CRM Software for Small Business" required>

<label>Target Audience</label>

<select name="audience">

<option>Business Owners</option>
<option>Startups</option>
<option>Professionals</option>
<option>General Readers</option>

</select>

<label>Target Word Count</label>

<select name="length">

<option>800 - 1000 words</option>
<option>1200 - 1500 words</option>
<option>2000+ words</option>

</select>

<label>Main Keywords</label>

<input name="keywords" placeholder="Example: CRM software, business CRM">

<label>Website / Brand Name</label>

<input name="brand" placeholder="Optional">

<label>Additional Instructions</label>

<textarea name="details" rows="4" placeholder="Any specific requirements or references"></textarea>

<button type="submit">Submit Content Request</button>

</form>

<p id="msg"></p>

</div>

<script>

document.getElementById("contentForm").onsubmit = async function(e){

e.preventDefault()

let formData = new FormData(this)

let data = {}

formData.forEach((v,k)=>data[k]=v)

let res = await fetch("/submit",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)
})

let result = await res.json()

document.getElementById("msg").innerText=result.message

}

</script>

</body>
</html>
