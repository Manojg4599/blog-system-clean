<!DOCTYPE html>
<html>
<head>

<title>ContentForge — Professional Content Request</title>

<style>

body{
font-family: Arial;
background:#f4f6f8;
padding:40px;
}

.container{
max-width:700px;
background:white;
padding:30px;
margin:auto;
border-radius:8px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

h1{
margin-bottom:10px;
}

label{
font-weight:bold;
display:block;
margin-top:15px;
}

.required{
color:red;
}

input,select,textarea{
width:100%;
padding:10px;
margin-top:5px;
border:1px solid #ccc;
border-radius:5px;
}

button{
margin-top:20px;
padding:12px;
background:#0a66c2;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#004182;
}

</style>

</head>

<body>

<div class="container">

<h1>Content Request Form</h1>

<form id="contentForm">

<label>Content Type <span class="required">*</span></label>
<select name="type" required>

<option value="">Select</option>
<option>Blog Article</option>
<option>SEO Landing Page</option>
<option>Comparison Page</option>
<option>Essay</option>
<option>Speech</option>
<option>Debate Script</option>
<option>Official Letter</option>
<option>Educational Guide</option>

</select>

<label>Topic / Title <span class="required">*</span></label>
<input name="topic" required>

<label>Target Audience <span class="required">*</span></label>
<input name="audience" required>

<label>Content Length</label>
<select name="length">

<option>1000 words</option>
<option>1500 words</option>
<option>2000 words</option>

</select>

<label>SEO Keywords</label>
<input name="keywords">

<label>Brand Name</label>
<input name="brand">

<label>Additional Instructions</label>
<textarea name="details"></textarea>

<button type="submit">Submit Request</button>

</form>

<p id="response"></p>

</div>

<script>

document.getElementById("contentForm").onsubmit = async function(e){

e.preventDefault();

const form = new FormData(this);

const data = Object.fromEntries(form.entries());

const res = await fetch("/submit",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(data)
});

const result = await res.json();

document.getElementById("response").innerText=result.message;

};

</script>

</body>
</html>
